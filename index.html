<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <title>Frontend Mentor | QR code component</title>

  <style>
    * {
      font-family: Outfit;
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background-color: hsl(212, 45%, 89%);
    }

    .qr-card {
      width: 320px;
      height: 499px;
      background-color: white;
      border-radius: 20px;
      margin-left: auto;
      margin-right: auto;
      margin-top: 230.5px;
    }

    .qr-code {
      width: 288px;
      height: 288px;
      object-fit: cover;
      object-position: center;
      border-radius: 10px;
      margin: 1rem;
      margin-bottom: 24px;
    }

    .info-container {
      text-align: center;
      padding: 0 1rem;
      margin: 0 1rem;
    }

    .title {
      color: hsl(218, 44%, 22%);
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 1rem;
    }

    .subtitle {
      color: hsl(216, 15%, 48%);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="qr-card">
    <img class="qr-code" src="images/image-qr-code.png" alt="qr-code">
    <div class="info-container">
      <p class="title">Improve your front-end skills by building projects</p>
      <p class="subtitle">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </div>
</body>
</html>
